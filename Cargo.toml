[package]
name = "backcast"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.15", features = ["default", "bevy_picking", "bevy_sprite_picking_backend"] }
bevy_pancam = "0.16"
bevy_vector_shapes = "0.9.3"
rand = "0.8"
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rfd = "0.17.2"
dirs = "6.0.0"
sha2 = "0.11.0"
bevy_cosmic_edit = "0.26"
undo = "0.52"

[dev-dependencies]
serial_test = "3.1"

[build-dependencies]
tonic-build = "0.12"
protoc-bin-vendored = "3.0"

[patch.crates-io]
bevy_cosmic_edit = { path = "crates/bevy_cosmic_edit" }
