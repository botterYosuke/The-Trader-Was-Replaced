[package]
name = "backcast"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.15", features = ["default", "bevy_picking", "bevy_sprite_picking_backend"] }
bevy_pancam = "0.16"
bevy_vector_shapes = "0.9.3"
rand = "0.8"
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rfd = "0.17.2"
dirs = "6.0.0"
bevy_cosmic_edit = "0.26"
syntect = { version = "5", default-features = false, features = ["default-fancy"] }
undo = "0.52"
chrono = "0.4"
url = "2"
regex = "1"
wait-timeout = "0.2"
zeroize = "1"

[dev-dependencies]
serial_test = "3.1"
tempfile = "3"
tokio-stream = "0.1"
# headless テストで CosmicFontSystem(FontSystem) を手構築するための直接参照
# （bevy_cosmic_edit の transitive 依存と同版に固定）
cosmic-text = "0.12"

[build-dependencies]
tonic-build = "0.12"
protoc-bin-vendored = "3.0"

[patch.crates-io]
bevy_cosmic_edit = { path = "crates/bevy_cosmic_edit" }
