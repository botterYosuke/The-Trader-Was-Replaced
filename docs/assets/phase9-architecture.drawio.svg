<svg host="app.diagrams.net" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1480" height="940" viewBox="0 0 1480 940" content="&lt;mxGraphModel&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;mxCell id=&quot;t1&quot; value=&quot;Phase 9 — Live Account &amp; Order API&quot; style=&quot;text;html=1;fontSize=18;fontColor=#e0e8f0;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;40&quot; y=&quot;12&quot; width=&quot;1400&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2540" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2440" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0f1628" stop-opacity="0.95"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5a8fd0"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5fae7a"/>
    </marker>
  </defs>

  <rect width="1480" height="940" fill="#05080f"/>
  <rect width="1480" height="940" fill="url(#grid)"/>
  <text x="40" y="38" fill="#e0e8f0" font-family="sans-serif" font-size="20" font-weight="bold">Phase 9 — Live Account &amp; Order API</text>
  <text x="40" y="60" fill="#7da0c8" font-family="sans-serif" font-size="12">手動発注経路（人間がボタンを押す）・口座同期・第二暗証番号 UX・運用系（auto-restart / idle shutdown / watchdog / instruments refresh）</text>

  <!-- ===================== RUST (Bevy GUI) column ===================== -->
  <rect x="40" y="90" width="430" height="800" rx="8" fill="none" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="60" y="118" fill="#9cc0f0" font-family="sans-serif" font-size="15" font-weight="bold">Rust — Bevy GUI (src/)</text>

  <!-- UI panels/modals -->
  <rect x="60" y="135" width="390" height="180" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="74" y="158" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">UI Node panels / modals (src/ui/)</text>
  <text x="74" y="182" fill="#c8d4e6" font-family="sans-serif" font-size="11">• OrderPanel + 2段階確認モーダル（LiveManual のみ）</text>
  <text x="74" y="202" fill="#c8d4e6" font-family="sans-serif" font-size="11">• SecretModal（第二暗証番号 / Tachibana・zeroize）</text>
  <text x="74" y="222" fill="#c8d4e6" font-family="sans-serif" font-size="11">• OrdersPanel 右クリック → 取消 / 訂正 + Modify モーダル</text>
  <text x="74" y="242" fill="#c8d4e6" font-family="sans-serif" font-size="11">• ReloginModal（venue 本体ログアウト通知, §3.5）</text>
  <text x="74" y="262" fill="#c8f0d8" font-family="sans-serif" font-size="11">• ReconcileModal（再起動後の注文 reconcile 通知, §3.8）★</text>
  <text x="74" y="288" fill="#8aa0bc" font-family="sans-serif" font-size="10">LiveOrders / PortfolioState / SecretPrompt / ReconcilePrompt resources</text>

  <!-- backend_sync -->
  <rect x="60" y="330" width="390" height="150" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="74" y="353" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">backend_sync.rs (lib)</text>
  <text x="74" y="377" fill="#c8d4e6" font-family="sans-serif" font-size="11">• status_update_system → apply_status_update()</text>
  <text x="74" y="397" fill="#c8d4e6" font-family="sans-serif" font-size="11">• backend_event_drain_system（push → resources）</text>
  <text x="74" y="417" fill="#c8f0d8" font-family="sans-serif" font-size="11">• backend_restart_resync_system（Crashed→Ready で GetOrders）★</text>
  <text x="74" y="437" fill="#c8d4e6" font-family="sans-serif" font-size="11">• reconcile_unknown_orders()（楽観的注文 vs venue 真実 diff）</text>
  <text x="74" y="461" fill="#8aa0bc" font-family="sans-serif" font-size="10">TransportCommand ↑ / BackendStatusUpdate ↓ / BackendEvent ↓ (mpsc)</text>

  <!-- supervisor -->
  <rect x="60" y="495" width="390" height="150" rx="6" fill="url(#card)" stroke="#3a6a4a"/>
  <text x="74" y="518" fill="#c8f0d8" font-family="sans-serif" font-size="13" font-weight="bold">backend_supervisor.rs (lib) — §3.8 ★</text>
  <text x="74" y="542" fill="#c8d4e6" font-family="sans-serif" font-size="11">• run_supervisor: 'session loop（probe→spawn→monitor）</text>
  <text x="74" y="562" fill="#c8d4e6" font-family="sans-serif" font-size="11">• CrashBudget（60s / 3-strike）→ auto-respawn</text>
  <text x="74" y="582" fill="#c8d4e6" font-family="sans-serif" font-size="11">• budget 超過 → Crashed 維持・手動 Restart 待ち</text>
  <text x="74" y="602" fill="#c8d4e6" font-family="sans-serif" font-size="11">• Restart: 現行 child を reap してから respawn</text>
  <text x="74" y="626" fill="#8aa0bc" font-family="sans-serif" font-size="10">spawn → Python backend (BACKEND_SUPERVISED=1)</text>

  <!-- transport task -->
  <rect x="60" y="660" width="390" height="100" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="74" y="683" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">main.rs — transport tokio task</text>
  <text x="74" y="707" fill="#c8d4e6" font-family="sans-serif" font-size="11">TransportCommand → gRPC（token 注入）: PlaceOrder /</text>
  <text x="74" y="727" fill="#c8d4e6" font-family="sans-serif" font-size="11">Cancel / Modify / SubmitSecret / GetOrders ★</text>
  <text x="74" y="747" fill="#c8d4e6" font-family="sans-serif" font-size="11">SubscribeBackendEvents stream 購読（Ready-gated 再接続）</text>

  <!-- ===================== gRPC column ===================== -->
  <rect x="510" y="135" width="150" height="625" rx="8" fill="#0c1426" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="528" y="160" fill="#9cc0f0" font-family="sans-serif" font-size="13" font-weight="bold">gRPC</text>
  <text x="528" y="178" fill="#7da0c8" font-family="sans-serif" font-size="11">:19876</text>
  <text x="528" y="210" fill="#c8d4e6" font-family="sans-serif" font-size="11">DataEngine</text>
  <text x="528" y="230" fill="#c8d4e6" font-family="sans-serif" font-size="11">Health</text>
  <text x="524" y="300" fill="#8ab0e0" font-family="sans-serif" font-size="10">PlaceOrder</text>
  <text x="524" y="320" fill="#8ab0e0" font-family="sans-serif" font-size="10">CancelOrder</text>
  <text x="524" y="340" fill="#8ab0e0" font-family="sans-serif" font-size="10">ModifyOrder</text>
  <text x="524" y="360" fill="#8ab0e0" font-family="sans-serif" font-size="10">GetOrderStatus</text>
  <text x="524" y="380" fill="#9fe0b8" font-family="sans-serif" font-size="10" font-weight="bold">GetOrders ★</text>
  <text x="524" y="400" fill="#8ab0e0" font-family="sans-serif" font-size="10">SubmitSecret</text>
  <text x="524" y="430" fill="#9fe0b8" font-family="sans-serif" font-size="10">Subscribe-</text>
  <text x="524" y="446" fill="#9fe0b8" font-family="sans-serif" font-size="10">BackendEvents</text>
  <text x="524" y="462" fill="#9fe0b8" font-family="sans-serif" font-size="10">(server-stream)</text>

  <!-- arrows Rust <-> gRPC -->
  <line x1="450" y1="700" x2="508" y2="430" stroke="#5a8fd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="508" y1="460" x2="450" y2="420" stroke="#5fae7a" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- ===================== Python column ===================== -->
  <rect x="700" y="90" width="740" height="800" rx="8" fill="none" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="720" y="118" fill="#9cc0f0" font-family="sans-serif" font-size="15" font-weight="bold">Python — Nautilus engine (python/engine/)</text>

  <!-- server_grpc -->
  <rect x="720" y="135" width="700" height="70" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="734" y="160" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">server_grpc.py — handlers + live session lifecycle</text>
  <text x="734" y="184" fill="#c8d4e6" font-family="sans-serif" font-size="11">write 系は Replay を EXECUTION_MODE_PRECONDITION で reject / read 系は全 mode 可 / GetOrders → facade.list_orders ★</text>

  <!-- facade + secret -->
  <rect x="720" y="220" width="340" height="140" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="734" y="243" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">ManualOrderFacade</text>
  <text x="734" y="266" fill="#c8d4e6" font-family="sans-serif" font-size="11">place / cancel / modify / get_status</text>
  <text x="734" y="286" fill="#c8f0d8" font-family="sans-serif" font-size="11">list_orders()（稼働中注文 = §3.8 reconcile）★</text>
  <text x="734" y="306" fill="#c8d4e6" font-family="sans-serif" font-size="11">in-memory order store（transport 非依存）</text>
  <text x="734" y="330" fill="#8aa0bc" font-family="sans-serif" font-size="10">OrderResult → OrderEvent → publish_backend_event</text>

  <rect x="1080" y="220" width="340" height="140" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="1094" y="243" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">SecretVault（Tachibana 専用）</text>
  <text x="1094" y="266" fill="#c8d4e6" font-family="sans-serif" font-size="11">create_request / wait_for / submit / get</text>
  <text x="1094" y="286" fill="#c8d4e6" font-family="sans-serif" font-size="11">メモリのみ・保管から 60s TTL で削除</text>
  <text x="1094" y="306" fill="#c8d4e6" font-family="sans-serif" font-size="11">SecondSecretResolver（push → wait）</text>
  <text x="1094" y="330" fill="#8aa0bc" font-family="sans-serif" font-size="10">SecretRequired push / SubmitSecret で resolve（cross-thread）</text>

  <!-- background components -->
  <rect x="720" y="375" width="340" height="120" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="734" y="398" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">background live components</text>
  <text x="734" y="421" fill="#c8d4e6" font-family="sans-serif" font-size="11">• AccountSync（30s・差分 push → AccountEvent）</text>
  <text x="734" y="441" fill="#c8d4e6" font-family="sans-serif" font-size="11">• VenueHealthWatchdog（kabu 30s ping → VenueLogout）</text>
  <text x="734" y="461" fill="#c8f0d8" font-family="sans-serif" font-size="11">• InstrumentsScheduler（5:00 JST → parquet 更新）★</text>
  <text x="734" y="481" fill="#8aa0bc" font-family="sans-serif" font-size="10">login 後 start / teardown で stop（best-effort）</text>

  <rect x="1080" y="375" width="340" height="120" rx="6" fill="url(#card)" stroke="#2a3a5a"/>
  <text x="1094" y="398" fill="#cfe0f5" font-family="sans-serif" font-size="13" font-weight="bold">BackendEventBus / IdleShutdown</text>
  <text x="1094" y="421" fill="#c8d4e6" font-family="sans-serif" font-size="11">• BackendEventBus（threadsafe queue fan-out）</text>
  <text x="1094" y="441" fill="#c8d4e6" font-family="sans-serif" font-size="11">  → SubscribeBackendEvents stream へ配信</text>
  <text x="1094" y="461" fill="#c8d4e6" font-family="sans-serif" font-size="11">• IdleShutdown（§3.7・standalone 60s idle）</text>
  <text x="1094" y="481" fill="#8aa0bc" font-family="sans-serif" font-size="10">BACKEND_SUPERVISED=1 配下では無効</text>

  <!-- venue adapters -->
  <rect x="720" y="555" width="700" height="150" rx="6" fill="url(#card)" stroke="#5a6a3a"/>
  <text x="734" y="578" fill="#e0d8a0" font-family="sans-serif" font-size="13" font-weight="bold">Venue adapters (exchanges/) — OrderingVenueAdapter</text>
  <text x="734" y="604" fill="#c8d4e6" font-family="sans-serif" font-size="11"><tspan font-weight="bold">TachibanaAdapter</tspan>: CLMKabuNewOrder/Correct/Cancel（sSecondPassword 必須・atomic 訂正）</text>
  <text x="734" y="624" fill="#c8d4e6" font-family="sans-serif" font-size="11">  EVENT WS: EC=約定通知 / SS=閉局検知。CLMZanKaiKanougaku + CLMGenbutuKabuList = 口座</text>
  <text x="734" y="650" fill="#c8d4e6" font-family="sans-serif" font-size="11"><tspan font-weight="bold">KabuStationAdapter</tspan>: POST /sendorder / PUT /cancelorder（Password 不要）</text>
  <text x="734" y="670" fill="#c8d4e6" font-family="sans-serif" font-size="11">  訂正 = 取消→残数量のみ新規（補償）。GET /orders 1s polling → OrderEvent。GET /wallet+positions = 口座</text>
  <text x="734" y="692" fill="#8aa0bc" font-family="sans-serif" font-size="10">set_execution_hooks(secret_resolver, on_order_event, on_venue_logout)</text>

  <!-- venue cloud -->
  <rect x="720" y="730" width="700" height="60" rx="6" fill="#101a14" stroke="#5a6a3a"/>
  <text x="734" y="755" fill="#cfe0d0" font-family="sans-serif" font-size="12" font-weight="bold">立花証券 e支店 API ／ kabuステーション API（Demo / Verify / Prod）</text>
  <text x="734" y="775" fill="#8aa0bc" font-family="sans-serif" font-size="10">※ EC URL / comma エンコード / SS prefix / 実発注は §5.1 layer-3（Demo）で検証（TENTATIVE）</text>

  <!-- arrows inside python -->
  <line x1="890" y1="360" x2="890" y2="375" stroke="#5a8fd0" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="890" y1="495" x2="890" y2="555" stroke="#5a8fd0" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="1060" y1="290" x2="1080" y2="290" stroke="#5a8fd0" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="1070" y1="555" x2="1070" y2="495" stroke="#5fae7a" stroke-width="1.2" marker-end="url(#arrowG)"/>
  <line x1="900" y1="730" x2="900" y2="705" stroke="#5fae7a" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- legend -->
  <text x="40" y="912" fill="#8aa0bc" font-family="sans-serif" font-size="11">★ = Phase 9 で新規 / Step 8-9 の追加。青矢印 = command/request（UI→backend→venue）、緑矢印 = event/push（venue→backend→UI）。</text>
</svg>
