syntax = "proto3";

package engine;

service Health {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }
  ServingStatus status = 1;
}

enum EngineState {
  IDLE = 0;
  LOADED = 1;
  RUNNING = 2;
  PAUSED = 3;
  STOPPING = 4;
}

enum EngineKind {
  NAUTILUS = 0;
  SIMULATED = 1;
}

enum ReplayGranularity {
  TICK = 0;
  SECOND = 1;
  MINUTE = 2;
  DAILY = 3;
}

service DataEngine {
  // Legacy/Static
  rpc GetState(GetStateRequest) returns (GetStateResponse);
  rpc Start(StartRequest) returns (StartResponse);
  rpc Stop(StopRequest) returns (StopResponse);

  // Nautilus Replay Control
  rpc LoadReplayData(LoadReplayDataRequest) returns (ReplayControlResponse);
  rpc StartEngine(StartEngineRequest) returns (StartEngineResponse);
  rpc StopEngine(StopEngineRequest) returns (ReplayControlResponse);
  rpc SetReplaySpeed(SetReplaySpeedRequest) returns (ReplayControlResponse);
  rpc PauseReplay(PauseReplayRequest) returns (ReplayControlResponse);
  rpc ResumeReplay(ResumeReplayRequest) returns (ReplayControlResponse);
  rpc StepReplay(StepReplayRequest) returns (ReplayControlResponse);
  rpc StopReplay(StopReplayRequest) returns (ReplayControlResponse);
  rpc ForceStopReplay(ForceStopReplayRequest) returns (ReplayControlResponse);

  // Catalog
  rpc ListInstruments(ListInstrumentsRequest) returns (ListInstrumentsResponse);
  rpc ListAllListedSymbols(ListAllListedSymbolsRequest) returns (ListAllListedSymbolsResponse);

  // Portfolio
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);

  // Live Venue / Market Data (Phase 8)
  rpc VenueLogin (VenueLoginRequest) returns (VenueLoginResponse);
  rpc VenueLogout (VenueLogoutRequest) returns (VenueControlResponse);
  rpc SubscribeMarketData (SubscribeRequest) returns (SubscribeResponse);
  rpc UnsubscribeMarketData (UnsubscribeRequest) returns (SubscribeResponse);
  rpc SetExecutionMode (SetExecutionModeRequest) returns (SetExecutionModeResponse);

  // issue #29 Slice 2': force the backend to re-emit the current account snapshot
  // (dedup-bypassing) on SubscribeBackendEvents. Fire-and-forget ack — the snapshot
  // itself returns via the existing AccountEvent stream, NOT inline. Rust calls this
  // right after applying the ExecutionModeChanged→Live reset that clears PortfolioState.
  rpc ForceAccountSnapshot (ForceAccountSnapshotRequest) returns (ForceAccountSnapshotResponse);

  // Phase 9 Step 0: Backend Event Transport (server-streaming).
  // Reverse-direction control-plane channel: server pushes BackendEvent to the UI.
  // Must be added before other Phase 9 RPCs (everything depends on this transport).
  rpc SubscribeBackendEvents (SubscribeBackendEventsReq) returns (stream BackendEvent);

  // Phase 9 Step 1: secret relay (Tachibana second-password).
  rpc SubmitSecret (SubmitSecretReq) returns (SubmitSecretRes);

  // Phase 9 Step 2: manual order execution facade (mock-backed for now; ADR §7).
  // Write RPCs reject in Replay mode (error_code=EXECUTION_MODE_PRECONDITION) and
  // require a live runner (error_code=VENUE_LOGIN_REQUIRED). On success they both
  // return the resulting OrderEvent inline AND push it on SubscribeBackendEvents.
  rpc PlaceOrder (PlaceOrderReq) returns (PlaceOrderRes);
  rpc CancelOrder (CancelOrderReq) returns (CancelOrderRes);
  // Phase 9 Step 4: modify (price/qty). Tachibana = CLMKabuCorrectOrder (atomic);
  // kabu = cancel→new conversion in the adapter (Step 6, non-atomic; UI warns).
  // Step 4 wires the full path through the mock adapter's modify_order.
  rpc ModifyOrder (ModifyOrderReq) returns (ModifyOrderRes);
  rpc GetOrderStatus (GetOrderStatusReq) returns (GetOrderStatusRes);
  // Phase 9 Step 8 §3.8: list the backend's currently-tracked working orders.
  // Used after an auto-restart to reconcile the UI's optimistic order list with
  // the backend's truth (a fresh backend has none → UI orders flagged "unknown").
  rpc GetOrders (GetOrdersReq) returns (GetOrdersRes);

  // Phase 10 Step 3: live strategy execution (auto). All unary — the only
  // streaming transport remains SubscribeBackendEvents (Phase 9 ADR "single
  // channel", M7). RegisterLiveStrategy validates a saved .py and issues an
  // opaque strategy_id; StartLiveStrategy promotes it to a Live Auto run.
  rpc RegisterLiveStrategy (RegisterLiveStrategyReq) returns (RegisterLiveStrategyRes);
  rpc StartLiveStrategy (StartLiveStrategyReq) returns (StartLiveStrategyRes);
  rpc StopLiveStrategy (StopLiveStrategyReq) returns (LiveStrategyControlRes);
  rpc PauseLiveStrategy (PauseLiveStrategyReq) returns (LiveStrategyControlRes);
  rpc ResumeLiveStrategy (ResumeLiveStrategyReq) returns (LiveStrategyControlRes);
  rpc GetLiveStrategyStatus (GetLiveStrategyStatusReq) returns (GetLiveStrategyStatusRes);
  rpc ListLiveStrategies (ListLiveStrategiesReq) returns (ListLiveStrategiesRes);

  // Lifecycle (Step 2: backend-startup-sync)
  rpc Shutdown (ShutdownRequest) returns (ShutdownResponse);
}

message GetStateRequest {
  string token = 1;
}

message GetStateResponse {
  string json_data = 1;
}

message StartRequest {
  string token = 1;
}

message StartResponse {
  bool success = 1;
}

message StopRequest {
  string token = 1;
}

message StopResponse {
  bool success = 1;
}

message ReplayControlResponse {
  bool success = 1;
  string request_id = 2;
  EngineState current_state = 3;
  string error_code = 4;
  string error_message = 5;
}

message StartEngineResponse {
  bool success = 1;
  string request_id = 2;
  EngineState current_state = 3;
  optional string error_code = 4;
  optional string error_message = 5;
  optional string run_id = 6;
  optional string summary_json = 7;
}

message LoadReplayDataRequest {
  string request_id = 1;
  repeated string instrument_ids = 2;
  string start_date = 3;
  string end_date = 4;
  optional ReplayGranularity granularity = 5;
  string token = 10;
  // When set, load data from a Nautilus ParquetDataCatalog at this path.
  // instrument_ids[0] is used as the BarType identifier for the catalog query.
  optional string catalog_path = 11;
}

message EngineStartConfig {
  string instrument_id = 1;
  repeated string instrument_ids = 2;
  optional string start_date = 3;
  optional string end_date = 4;
  optional string initial_cash = 5;
  optional ReplayGranularity granularity = 6;
  optional string strategy_file = 7;
  optional string strategy_init_kwargs = 8;
  optional uint32 max_qty = 9;
  optional uint64 max_notional_jpy = 10;
}

message StartEngineRequest {
  string request_id = 1;
  EngineKind engine = 2;
  string strategy_id = 3;
  EngineStartConfig config = 4;
  string token = 10;
}

message StopEngineRequest {
  string request_id = 1;
  string token = 10;
}

message SetReplaySpeedRequest {
  string request_id = 1;
  uint32 multiplier = 2;
  string token = 10;
}

message PauseReplayRequest {
  string request_id = 1;
  string token = 10;
}

message ResumeReplayRequest {
  string request_id = 1;
  string token = 10;
}

message StepReplayRequest {
  string request_id = 1;
  string token = 10;
}

message StopReplayRequest {
  string request_id = 1;
  string token = 10;
}

message ForceStopReplayRequest {
  string request_id = 1;
  string token = 10;
}

message ListInstrumentsRequest {
  string token = 1;
  // "replay" is the only supported source for now
  optional string source = 2;
}

message Instrument {
  string id = 1;
  // Human-readable name. For Replay catalog sources where name/market metadata
  // is unavailable, this is filled with `id` and `market` is left empty.
  // Live venue adapters populate these fields when they back ListInstruments.
  string name = 2;
  string market = 3;
}

message ListInstrumentsResponse {
  bool success = 1;
  // Legacy id-only field. Kept for backwards compatibility; new clients should
  // prefer `instruments` which carries name/market metadata.
  repeated string instrument_ids = 2;
  string error_message = 3;
  repeated Instrument instruments = 4;
}

message ListAllListedSymbolsRequest {
  string token = 1;
  string end_date = 2;
}

message ListAllListedSymbolsResponse {
  bool success = 1;
  repeated string instrument_ids = 2;
  string error_message = 3;
  string resolved_end_date = 4;
}

message GetPortfolioRequest {
  string token = 1;
}

message PortfolioPosition {
  string symbol = 1;
  int64 qty = 2;
  double avg_price = 3;
  double unrealized_pnl = 4;
}

message PortfolioOrder {
  string symbol = 1;
  string side = 2;
  double qty = 3;
  double price = 4;
  string status = 5;
  int64 ts_ms = 6;
}

message GetPortfolioResponse {
  bool success = 1;
  double buying_power = 2;
  double cash = 3;
  double equity = 4;
  repeated PortfolioPosition positions = 5;
  repeated PortfolioOrder orders = 6;
  string error_message = 7;
}

// === Phase 8: Live Venue / Market Data ===

message VenueLoginRequest {
  string venue_id = 1;
  string credentials_source = 2;
  string environment_hint = 3;
  string token = 4;
}

message VenueLoginResponse {
  bool success = 1;
  string error_code = 2;
  string venue_state = 3;
  int32 instruments_loaded = 4;
}

message VenueLogoutRequest {
  string token = 1;
}

message VenueControlResponse {
  bool success = 1;
  string error_code = 2;
}

message SubscribeRequest {
  string instrument_id = 1;
  repeated string channels = 2;
  string token = 3;
}

message SubscribeResponse {
  bool success = 1;
  string error_code = 2;
}

message UnsubscribeRequest {
  string instrument_id = 1;
  string token = 2;
}

message SetExecutionModeRequest {
  string mode = 1;
  string token = 2;
}

message SetExecutionModeResponse {
  bool success = 1;
  string error_code = 2;
  string execution_mode = 3;
}

message ForceAccountSnapshotRequest {
  string token = 1;
}

message ForceAccountSnapshotResponse {
  bool success = 1;
  string error_code = 2;
}

message ShutdownRequest {
  string token = 1;
  uint32 grace_seconds = 2;
}

message ShutdownResponse {
  bool accepted = 1;
  string error_code = 2;
}

// === Phase 9 Step 0: Backend Event Transport ===

message SubscribeBackendEventsReq {
  string token = 1;
}

// SecretRequired: Tachibana only. Server asks the UI to collect the second
// password. kabu never emits this (Password not required).
message SecretRequired {
  string request_id = 1;
  string venue = 2;
  string kind = 3;     // e.g. "second_secret"
  string purpose = 4;  // e.g. "new_order" / "cancel_order" / "correct_order"
}

// SubmitSecret: UI returns the collected secret for a SecretRequired.request_id.
// `secret` lives only on the request; never echoed in the response or logs.
message SubmitSecretReq {
  string token = 1;
  string request_id = 2;
  string secret = 3;
}

message SubmitSecretRes {
  bool success = 1;
  string error_code = 2;
}

message OrderEvent {
  string order_id = 1;
  string venue_order_id = 2;
  string client_order_id = 3;
  string status = 4;       // Nautilus OrderStatus name
  double filled_qty = 5;
  double avg_price = 6;
  int64 ts_ms = 7;
  // Phase 10 (§2.9 / M6): the ordering subject's Nautilus StrategyId.
  // Manual orders carry "MANUAL-001"; each Live Auto run carries "LIVE-{run}".
  // Additive (proto3 optional): pre-Phase-10 producers leave it unset → "".
  optional string strategy_id = 8;
  // issue #29 Slice 3a: static order attributes so a GetOrders snapshot can
  // reconstruct a full UI order row (symbol/side/qty/price) at connect/restart
  // seed time — the ids+status+fill fields above are not enough on their own.
  // Populated by the manual order facade (place/cancel/modify); EC-stream pushes
  // that don't know the static attrs leave them at default (""/0) and the UI keeps
  // the known values ("non-empty wins"). `price` is unset for market orders.
  string symbol = 9;
  string side = 10;        // "BUY" / "SELL"
  double qty = 11;
  optional double price = 12;  // unset => market order (no limit price)
}

message AccountPosition {
  string symbol = 1;
  int64 qty = 2;
  double avg_price = 3;
  double unrealized_pnl = 4;
}

message AccountEvent {
  double cash = 1;
  double buying_power = 2;
  repeated AccountPosition positions = 3;
  int64 ts_ms = 4;
}

message VenueLogoutDetected {
  string venue = 1;
}

// === Phase 10 Step 3: live strategy telemetry (BackendEvent oneof additions, M8) ===

// LiveStrategyEvent: a Live Auto run changed lifecycle state. Pushed on each
// READY/RUNNING/PAUSED/STOPPED/ERROR transition so the UI Run Badge / Live Run
// Panel can track state without polling GetLiveStrategyStatus.
message LiveStrategyEvent {
  string run_id = 1;
  string strategy_id = 2;  // RegisterLiveStrategy opaque handle
  string status = 3;       // READY/RUNNING/PAUSED/STOPPED/ERROR
  int64 ts_ms = 4;
}

// SafetyRailViolation: a pre/post-trade safety rail blocked or tripped (§2.4).
// `kind` is the rail name (e.g. "MAX_POSITION_SIZE", "MAX_DAILY_LOSS"); `detail`
// is a short human-readable explanation for the toast (§2.10).
message SafetyRailViolation {
  string run_id = 1;
  string kind = 2;
  string detail = 3;
  int64 ts_ms = 4;
}

// BackendError: a backend-side error surfaced to the UI as a toast (issue #29).
// `source` distinguishes the producer ("account_sync" tick / "server_grpc" start
// failure, etc.); `detail` is a short human-readable explanation for the toast.
message BackendError {
  string source = 1;
  string detail = 2;
  int64 ts_ms = 3;
}

// StrategyLogMessage: relays a strategy's own `self.log.*` line to the UI's
// Live Run Panel (last ~100 lines). `level` is the Python log level name.
message StrategyLogMessage {
  string run_id = 1;
  string level = 2;     // "INFO" / "WARNING" / "ERROR" ...
  string message = 3;
  int64 ts_ms = 4;
}

// === Phase 10 Step 7: per-run telemetry (BackendEvent oneof addition, §2.9) ===

// LiveStrategyTelemetry: run-scoped PnL / order / fill counters for the Live Run
// Panel (§2.8 / §2.9). The lifecycle `LiveStrategyEvent` carries only status, so
// run-level numbers ride this separate event. `strategy_id` is the run's Nautilus
// StrategyId ("LIVE-{run}") — the same value tagged on that run's OrderEvents, so
// the panel and the OrdersPanel filter agree on the ordering subject.
// Pushed on order events for the run and on each account snapshot (for unrealized
// mark-to-market). Account-level net position stays in the existing AccountEvent /
// PositionsPanel (§2.9) — this is run-scoped, not the account total.
message LiveStrategyTelemetry {
  string run_id = 1;
  string strategy_id = 2;       // Nautilus StrategyId ("LIVE-{run}")
  double realized_pnl = 3;      // JPY, this run's strategy only
  double unrealized_pnl = 4;    // JPY, this run's open positions marked-to-market
  int64 order_count = 5;        // orders submitted by this run
  int64 fill_count = 6;         // filled orders for this run
  int64 ts_ms = 7;
}

message BackendEvent {
  oneof payload {
    SecretRequired secret_required = 1;
    OrderEvent order_event = 2;
    AccountEvent account_event = 3;
    VenueLogoutDetected venue_logout_detected = 4;
    LiveStrategyEvent live_strategy_event = 5;
    SafetyRailViolation safety_rail_violation = 6;
    StrategyLogMessage strategy_log_message = 7;
    LiveStrategyTelemetry live_strategy_telemetry = 8;
    BackendError backend_error = 9;
  }
}

// === Phase 9 Step 2: manual order execution facade ===

message PlaceOrderReq {
  string token = 1;
  string venue = 2;
  string instrument_id = 3;
  string side = 4;                    // "BUY" / "SELL"
  double qty = 5;
  optional double price = 6;          // absent => market order
  string order_type = 7;              // "MARKET" / "LIMIT"
  string time_in_force = 8;           // "DAY" / "OPENING" / "CLOSING" / "IOC" ...
  optional string second_secret = 9;  // Tachibana only (Step 5); ignored by mock/kabu
}

message PlaceOrderRes {
  bool success = 1;
  string error_code = 2;
  OrderEvent order_event = 3;  // populated when success (incl. venue REJECTED outcome)
}

message CancelOrderReq {
  string token = 1;
  string venue = 2;
  string order_id = 3;                 // client_order_id (UI optimistic tracking key)
  optional string second_secret = 4;   // Tachibana only (Step 5)
}

message CancelOrderRes {
  bool success = 1;
  string error_code = 2;
  OrderEvent order_event = 3;
}

message ModifyOrderReq {
  string token = 1;
  string venue = 2;
  string order_id = 3;                 // client_order_id (UI optimistic tracking key)
  optional double new_price = 4;       // absent => price unchanged
  optional double new_qty = 5;         // absent => qty unchanged
  optional string second_secret = 6;   // Tachibana only (Step 5)
}

message ModifyOrderRes {
  bool success = 1;
  string error_code = 2;
  OrderEvent order_event = 3;
}

message GetOrderStatusReq {
  string token = 1;
  string venue = 2;
  string order_id = 3;  // client_order_id
}

message GetOrderStatusRes {
  bool success = 1;
  string error_code = 2;
  OrderEvent order_event = 3;
}

message GetOrdersReq {
  string token = 1;
  string venue = 2;
}

message GetOrdersRes {
  bool success = 1;
  string error_code = 2;
  repeated OrderEvent orders = 3;  // backend's currently-tracked working (non-terminal) orders
}

// === Phase 10 Step 3: live strategy execution ===

message SafetyLimits {
  int64 max_position_size_jpy = 1;   // independent pre-trade hook (§2.4 / M1)
  int64 max_order_value_jpy = 2;     // → LiveRiskEngineConfig.max_notional_per_order (native)
  int64 max_daily_loss_jpy = 3;      // independent post-trade hook
  int32 max_orders_per_minute = 4;   // → LiveRiskEngineConfig.max_order_submit_rate (native)
  repeated string allowed_instruments = 5;  // independent pre-trade hook (whitelist)
}

// Snapshot of a Live Auto run's lifecycle. nautilus_strategy_id is the ordering
// subject (StrategyId) used to filter OrderEvent.strategy_id (§2.9 / M6).
message LiveStrategyStatus {
  string run_id = 1;
  string strategy_id = 2;           // RegisterLiveStrategy opaque handle
  string nautilus_strategy_id = 3;  // ordering-subject StrategyId
  string instrument_id = 4;
  string venue = 5;
  string status = 6;                // READY/RUNNING/PAUSED/STOPPED/ERROR
  int64 ts_ms = 7;
}

message RegisterLiveStrategyReq {
  string token = 1;
  string request_id = 2;
  string strategy_file = 3;   // saved .py path; backend resolves + loads to validate
  string expected_sha256 = 4; // TOCTOU guard vs the confirm modal; empty → skip check
}

message RegisterLiveStrategyRes {
  bool success = 1;
  string request_id = 2;
  string error_code = 3;
  string strategy_id = 4;      // opaque handle passed to StartLiveStrategy
  string strategy_sha256 = 5;  // re-confirm at Promote time
  string display_name = 6;
}

message StartLiveStrategyReq {
  // No raw host path: StartLiveStrategy takes the validated strategy_id only
  // (avoids letting the live auto path exec an arbitrary file, M9).
  string token = 1;
  string request_id = 2;
  string strategy_id = 3;     // validated handle from RegisterLiveStrategy
  string instrument_id = 4;
  string venue = 5;
  map<string, string> params = 6;
  SafetyLimits safety_limits = 7;
}

message StartLiveStrategyRes {
  bool success = 1;
  string request_id = 2;
  string error_code = 3;
  string run_id = 4;
  LiveStrategyStatus status = 5;
}

message StopLiveStrategyReq { string token = 1; string request_id = 2; string run_id = 3; }
message PauseLiveStrategyReq { string token = 1; string request_id = 2; string run_id = 3; }
message ResumeLiveStrategyReq { string token = 1; string request_id = 2; string run_id = 3; }
message GetLiveStrategyStatusReq { string token = 1; string request_id = 2; string run_id = 3; }
message ListLiveStrategiesReq { string token = 1; string request_id = 2; }

message LiveStrategyControlRes {
  bool success = 1;
  string request_id = 2;
  string error_code = 3;
  LiveStrategyStatus status = 4;
}

message GetLiveStrategyStatusRes {
  bool success = 1;
  string request_id = 2;
  string error_code = 3;
  LiveStrategyStatus status = 4;
}

message ListLiveStrategiesRes {
  bool success = 1;
  string request_id = 2;
  string error_code = 3;
  repeated LiveStrategyStatus strategies = 4;
}
